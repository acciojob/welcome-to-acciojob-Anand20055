<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accio Jobs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f5f7fa;
            color: #333;
        }

        header {
            background-color: #4a90e2;
            padding: 20px;
            text-align: center;
            color: white;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 800px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 15px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #eee;
            font-size: 0.9rem;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to Accio Jobs!</h1>
    </header>

    <main>
        <section class="container">
            <h2>Your Gateway to Career Opportunities</h2>
            <p>
                Explore a wide range of job opportunities tailored for your skills.
                Accio Jobs helps you connect with top companies and build your dream career.
            </p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Accio Jobs. All rights reserved.</p>
    </footer>

</body>
</html>
